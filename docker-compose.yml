services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: batchcraft
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-batchcraft}
      POSTGRES_DB: batchcraft
    ports:
      # Host-only bind so local venv / `flask` CLI can use DATABASE_URL (see .env.example).
      - "127.0.0.1:${HOST_DB_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U batchcraft"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://batchcraft:${POSTGRES_PASSWORD:-batchcraft}@db:5432/batchcraft
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-jwt-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:6080,https://batchcraft.yourdomain.com}
      # Passed from repo-root .env into the container (Compose does not auto-forward every .env key)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    ports:
      - "${HOST_BACKEND_PORT:-6001}:5000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:6001}
    ports:
      - "${HOST_FRONTEND_PORT:-6080}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
